services:
  - type: web
    name: hotel-dashboard
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: RENDER
        value: true
      - key: DATABASE_URL
        sync: false   # definir manualmente no painel do Render
