services:
  - type: web
    name: hotel-dashboard
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    envVars:
      - key: RENDER
        value: true
      - key: DATABASE_URL
        sync: false   # definir manualmente no painel do Render
      - key: GOOGLE_PLACES_API_KEY
        sync: false   # definir manualmente no painel do Render
